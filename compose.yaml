name: pl-timetabler
services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports: ["127.0.0.1:${WEB_PORT:-18080}:80"]
    depends_on:
      api: { condition: service_healthy }
    restart: unless-stopped
    networks:
      default: {}
      kdhoon-public:
        aliases: [timetabler-web]
  api:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    command: ["uvicorn", "timetabler.api.app:app", "--host", "0.0.0.0", "--port", "8000", "--proxy-headers"]
    environment:
      TIMETABLER_ENVIRONMENT: production
      TIMETABLER_DATABASE_URL: postgresql+asyncpg://timetabler:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/timetabler
      TIMETABLER_CORS_ORIGINS: '["http://localhost:18080","https://timetabler.kdhoon.me"]'
      TIMETABLER_OPTIMIZATION_RATE_LIMIT_REQUESTS: ${TIMETABLER_OPTIMIZATION_RATE_LIMIT_REQUESTS:-12}
      TIMETABLER_OPTIMIZATION_RATE_LIMIT_WINDOW_SECONDS: ${TIMETABLER_OPTIMIZATION_RATE_LIMIT_WINDOW_SECONDS:-60}
      TIMETABLER_OPTIMIZATION_ACTIVE_JOB_LIMIT: ${TIMETABLER_OPTIMIZATION_ACTIVE_JOB_LIMIT:-100}
      TIMETABLER_OPTIMIZATION_JOB_RETENTION_HOURS: ${TIMETABLER_OPTIMIZATION_JOB_RETENTION_HOURS:-24}
      TIMETABLER_AUTH_ENABLED: ${TIMETABLER_AUTH_ENABLED:-false}
      TIMETABLER_AUTH_HMAC_SECRET: ${TIMETABLER_AUTH_HMAC_SECRET:-}
      TIMETABLER_AUTH_EMAIL_PROVIDER: ${TIMETABLER_AUTH_EMAIL_PROVIDER:-disabled}
      TIMETABLER_AUTH_RESEND_API_KEY: ${TIMETABLER_AUTH_RESEND_API_KEY:-}
      TIMETABLER_AUTH_RESEND_FROM: ${TIMETABLER_AUTH_RESEND_FROM:-}
      TIMETABLER_AUTH_OTP_RECORD_RETENTION_SECONDS: ${TIMETABLER_AUTH_OTP_RECORD_RETENTION_SECONDS:-86400}
      TIMETABLER_AUTH_SESSION_RECORD_RETENTION_SECONDS: ${TIMETABLER_AUTH_SESSION_RECORD_RETENTION_SECONDS:-604800}
    expose: ["8000"]
    depends_on:
      db: { condition: service_healthy }
      ingest: { condition: service_completed_successfully }
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/live', timeout=2)"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s
  optimizer:
    build: { context: ., dockerfile: apps/backend/Dockerfile }
    command: ["timetabler-optimizer"]
    environment:
      TIMETABLER_ENVIRONMENT: production
      TIMETABLER_DATABASE_URL: postgresql+asyncpg://timetabler:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/timetabler
    depends_on:
      db: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
    restart: unless-stopped
  migrate:
    build: { context: ., dockerfile: apps/backend/Dockerfile }
    command: ["alembic", "upgrade", "head"]
    environment:
      TIMETABLER_DATABASE_URL: postgresql+asyncpg://timetabler:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/timetabler
    depends_on: { db: { condition: service_healthy } }
    restart: "no"
  ingest:
    build: { context: ., dockerfile: apps/backend/Dockerfile }
    command: ["timetabler-ingest"]
    environment:
      TIMETABLER_DATABASE_URL: postgresql+asyncpg://timetabler:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/timetabler
      TIMETABLER_DATA_ROOT: /data
    volumes: ["./data:/data:ro"]
    depends_on: { migrate: { condition: service_completed_successfully } }
    restart: "no"
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: timetabler
      POSTGRES_USER: timetabler
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    # PostgreSQL 18 stores cluster data below a versioned subdirectory.
    volumes: ["postgres_data:/var/lib/postgresql"]
    expose: ["5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timetabler -d timetabler"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
networks:
  kdhoon-public:
    external: true
volumes: { postgres_data: }
