map $http_cf_connecting_ip $timetabler_client_ip {
  # The only non-loopback ingress is the co-located Cloudflare Tunnel. The web
  # port itself is bound to 127.0.0.1 in Compose, so direct callers are trusted
  # server-local operators and fall back to their socket address.
  default $http_cf_connecting_ip;
  "" $remote_addr;
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  server_tokens off;

  include /etc/nginx/security-headers.conf;

  location = /healthz {
    access_log off;
    include /etc/nginx/security-headers.conf;
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  location /api/ {
    proxy_pass http://api:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Request-ID $request_id;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $timetabler_client_ip;
    proxy_set_header CF-Connecting-IP $timetabler_client_ip;
  }

  location /assets/ {
    try_files $uri =404;
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location / {
    try_files $uri $uri/ /index.html;
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "no-cache";
  }
}
